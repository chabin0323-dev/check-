<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相性占いプロ版</title>
    <style>
        body { margin: 0; background-color: #0f021b; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; color: white; }
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        /* 画像パスを確実に通すため /public/ ではなく public/ に修正 */
        img { width: 100%; border-radius: 15px; margin-bottom: 20px; height: auto; display: block; margin-left: auto; margin-right: auto; }
        .btn-img { cursor: pointer; transition: transform 0.2s; max-width: 380px; width: 90%; border: none; }
        .btn-img:hover { transform: scale(1.05); }
        .price { font-weight: bold; font-size: 24px; color: #ff4da6; margin: 20px 0; }
        .cards-bg { background: white; padding: 15px; border-radius: 10px; margin-top: 20px; }
        h2 { font-size: 20px; margin: 10px 0; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="container">
        <img src="public/app_concept.png" alt="サービスイメージ">

        <h2>二人の波動は、<br>変化の途中にあります</h2>
        <p style="opacity: 0.8; font-size: 14px; line-height: 1.6;">あなたの入力情報から導かれたこの数値は、お相手との今の関係性・感情の温度・未来の流れを総合したものです。</p>

        <a href="https://www.paypal.com/ncp/payment/PPGD76J8JB8ZQ" target="_blank" style="text-decoration: none; border: none; outline: none;">
            <img src="public/image_7.png" alt="無制限解放ボタン" class="btn-img">
        </a>

        <div class="price">使い放題 780円</div>

        <div class="cards-bg">
            <p style="color: #333; font-size: 12px; margin-bottom: 10px; font-weight: bold;">安心のPayPal決済に対応</p>
            <img src="public/cards.png" alt="カード一覧" style="max-width: 300px; margin-bottom: 0;">
        </div>
    </div>
</body>
</html>
